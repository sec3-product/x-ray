name: Build and push llvm-prebuilt image

on:
  workflow_dispatch:

env:
  QEMU_BINFMT_IMAGE: tonistiigi/binfmt:qemu-v10.2.1

jobs:
  build-amd64:
    runs-on: self-hosted
    env:
      LLVM_PREBUILT_TAG: amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build llvm-prebuilt image
        run: |
          make build-llvm-prebuilt-image

      - name: Login to registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push llvm-prebuilt image
        run: |
          make push-llvm-prebuilt-image

  build-arm64:
    runs-on: [self-hosted, qemu]
    env:
      LLVM_PREBUILT_TAG: arm64
      TARGET_ARCH: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup QEMU builder
        run: |
          docker run --privileged --rm ${{ env.QEMU_BINFMT_IMAGE }} --version
          docker run --privileged --rm ${{ env.QEMU_BINFMT_IMAGE }} --uninstall qemu-* || true
          docker run --privileged --rm ${{ env.QEMU_BINFMT_IMAGE }} --install arm64

      - name: Print QEMU and binfmt diagnostics
        run: |
          uname -a
          cat /proc/sys/fs/binfmt_misc/qemu-aarch64
          docker run --rm --platform linux/arm64 ubuntu:22.04 uname -m

      - name: Build llvm-prebuilt image
        run: |
          make build-llvm-prebuilt-image

      - name: Login to registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push llvm-prebuilt image
        run: |
          make push-llvm-prebuilt-image

  push-manifest:
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Create and push multi-arch manifest
        run: |
          make push-llvm-prebuilt-manifest
